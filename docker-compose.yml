version: '3.8'

services:
  mcp-web-scrape:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-web-scrape:latest
    container_name: mcp-web-scrape
    restart: unless-stopped

    # Порты
    ports:
      - "8192:8192"    # MCP endpoint & HTTP server

    # Переменные окружения
    environment:
      - MCP_WEB_SCRAPE_LOG_LEVEL=info
      - MCP_WEB_SCRAPE_SERVER_HOST=0.0.0.0
      - MCP_WEB_SCRAPE_SERVER_PORT=8192
      - MCP_WEB_SCRAPE_BROWSER_ENABLED=true
      - MCP_WEB_SCRAPE_BROWSER_HEADLESS=true
      - MCP_WEB_SCRAPE_BROWSER_NO_SANDBOX=true
      - MCP_WEB_SCRAPE_RATE_LIMIT_ENABLED=true
      - MCP_WEB_SCRAPE_CACHE_ENABLED=true

    # Volumes
    volumes:
      # Конфигурация (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Cache directory (будущая функциональность)
      - mcp-cache:/app/cache

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8192/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Resource limits (важно для Chrome)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Networks
    networks:
      - mcp-network

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Опционально: Prometheus для мониторинга (будущая функциональность)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - mcp-network

volumes:
  mcp-cache:
    driver: local

networks:
  mcp-network:
    driver: bridge

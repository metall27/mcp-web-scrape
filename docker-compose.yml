services:
  mcp-web-scrape:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-web-scrape:latest
    container_name: mcp-web-scrape

    # Restart policy
    restart: unless-stopped

    # Порты
    ports:
      - "8192:8192"    # MCP endpoint & HTTP server

    # Переменные окружения
    environment:
      - MCP_WEB_SCRAPE_LOG_LEVEL=info
      - MCP_WEB_SCRAPE_SERVER_HOST=0.0.0.0
      - MCP_WEB_SCRAPE_SERVER_PORT=8192
      - MCP_WEB_SCRAPE_BROWSER_ENABLED=true
      - MCP_WEB_SCRAPE_BROWSER_HEADLESS=true
      - MCP_WEB_SCRAPE_BROWSER_NO_SANDBOX=true
      - MCP_WEB_SCRAPE_RATE_LIMIT_ENABLED=true
      - MCP_WEB_SCRAPE_CACHE_ENABLED=true
      - TZ=Europe/Moscow

    # Volumes
    volumes:
      # Конфигурация (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Cache directory
      - mcp-cache:/app/cache
      # Chrome shared memory (критично для headless Chrome)
      - chrome-shm:/dev/shm

    # Shared memory size (КРИТИЧНО для Chrome!)
    shm_size: '256mb'

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8192/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Resource limits (оптимизировано для Chrome + Go)
    deploy:
      resources:
        limits:
          cpus: '4.0'           # Max 4 CPU cores
          memory: 4G            # Max 4GB RAM
        reservations:
          cpus: '1.0'           # Гарантируем 1.0 CPU cores
          memory: 1G            # Гарантируем 1GB RAM

    # Security options
    security_opt:
      - no-new-privileges:true

    # Ulimits (system resource limits)
    ulimits:
      nproc: 512                 # Max processes
      nofile:
        soft: 4096              # Soft limit open files
        hard: 8192              # Hard limit open files

    # DNS settings
    dns:
      - 8.8.8.8                  # Google DNS
      - 8.8.4.4                  # Google DNS backup

    # Networks
    networks:
      - mcp-network

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Labels
    labels:
      - "com.mcp-web-scrape.version=1.0"
      - "com.mcp-web-scrape.phase=5-complete"
      - "com.mcp-web-scrape.production-ready=true"

volumes:
  mcp-cache:
    driver: local
  chrome-shm:
    driver: local

networks:
  mcp-network:
    driver: bridge

services:
  mcp-web-scrape:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-web-scrape:latest
    container_name: mcp-web-scrape

    # Restart policy с задержкой (предотвращает rapid restart loops)
    restart: unless-stopped
    restart_delay: 5s

    # Порты
    ports:
      - "8192:8192"    # MCP endpoint & HTTP server

    # Переменные окружения
    environment:
      - MCP_WEB_SCRAPE_LOG_LEVEL=info
      - MCP_WEB_SCRAPE_SERVER_HOST=0.0.0.0
      - MCP_WEB_SCRAPE_SERVER_PORT=8192
      - MCP_WEB_SCRAPE_BROWSER_ENABLED=true
      - MCP_WEB_SCRAPE_BROWSER_HEADLESS=true
      - MCP_WEB_SCRAPE_BROWSER_NO_SANDBOX=true
      - MCP_WEB_SCRAPE_RATE_LIMIT_ENABLED=true
      - MCP_WEB_SCRAPE_CACHE_ENABLED=true

    # Volumes
    volumes:
      # Конфигурация (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # Cache directory
      - mcp-cache:/app/cache
      # Chrome shared memory (критично для headless Chrome)
      - chrome-shm:/dev/shm

    # Shared memory size (КРИТИЧНО для Chrome!)
    # Chrome требует достаточно /dev/shm для tab rendering
    shm_size: '256mb'

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8192/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    # Resource limits (оптимизировано для Chrome + Go)
    # Увеличены в 2 раза для production reliability
    deploy:
      resources:
        limits:
          cpus: '4.0'           # Max 4 CPU cores (was 2.0)
          memory: 4G            # Max 4GB RAM (was 2GB)
        reservations:
          cpus: '1.0'           # Гарантируем 1.0 CPU cores (was 0.5)
          memory: 1G            # Гарантируем 1GB RAM (was 512MB)

      # Restart policy (Docker Swarm mode)
      restart_policy:
        condition: unless-stopped
        delay: 5s
        max_attempts: 3
        window: 120s

      # Process limits
      # Предотвращает fork bombs и process explosions
      pids_limit: 512

    # Security options (balanced for Chrome)
    security_opt:
      - no-new-privileges:true  # Предотвращает privilege escalation
      - seccomp=default          # Standard seccomp profile

    # Ulimits (system resource limits)
    ulimits:
      nproc: 512                 # Max processes
      nofile:
        soft: 4096              # Soft limit open files
        hard: 8192              # Hard limit open files

    # DNS settings
    dns:
      - 8.8.8.8                  # Google DNS
      - 8.8.4.4                  # Google DNS backup
      - 1.1.1.1                  # Cloudflare DNS

    # DNS search domains
    dns_search: []

    # Network mode
    network_mode: bridge

    # Networks
    networks:
      mcp-network:
        aliases:
          - mcp-web-scrape

    # Logging (улучшенное)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 10MB per file
        max-file: "3"            # Keep 3 files (30MB total)
        compress: "true"        # Compress old logs

    # Timezone
    timezone: "UTC"

    # Process isolation (Linux only)
    # cgroup parent для иерархического управления ресурсами
    # cgroup_parent: "mcp-web-scrape.scope"

    # Labels (для metadata и monitoring)
    labels:
      - "com.mcp-web-scrape.version=1.0"
      - "com.mcp-web-scrape.phase=5-complete"
      - "com.mcp-web-scrape.production-ready=true"
      - "monitoring.enabled=true"

  # Опционально: Prometheus для мониторинга (будущая функциональность)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - mcp-network

volumes:
  mcp-cache:
    driver: local
  chrome-shm:
    driver: local

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
